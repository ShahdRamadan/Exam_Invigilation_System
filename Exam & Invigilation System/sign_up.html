<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء حساب جديد - نظام الامتحانات</title>

    <link rel="stylesheet" href="Styles/login.css">

    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

    <div class="login-container">

        <header class="login-header">
            <img src="Images/UNI_LOGO.png" alt="شعار جامعة الغردقة" class="logo">
            <h1>نظام المراقبة والامتحانات</h1>
            <p>Hurghada University – Exam & Invigilation System</p>
        </header>

        <form action="#" method="POST" class="login-form">

            <div class="role-selector">
                <input type="radio" id="role-student" name="role" value="student" checked>
                <label for="role-student">طالب</label>

                <input type="radio" id="role-proctor" name="role" value="proctor">
                <label for="role-proctor"> مراقب / ملاحظ</label>
            </div>
            <div class="input-group">
                <i class="fa-solid fa-signature"></i>
                <input type="text" id="fullname" name="fullname" placeholder="الاسم بالكامل / Full Name" required>
            </div>

            <div class="input-group">
                <i class="fa-solid fa-envelope"></i>
                <input type="email" id="email" name="email" placeholder="البريد الإلكتروني / Email" required>
            </div>
            <div class="input-group">
                <i class="fa-solid fa-user"></i>
                <input type="text" id="username" name="username" placeholder="الرقم الجامعي / University ID" required>
            </div>

            <div class="input-group">
                <i class="fa-solid fa-lock"></i>
                <input type="password" id="password" name="password" placeholder="كلمة المرور / Password" required>
            </div>

            <div class="input-group">
                <i class="fa-solid fa-lock"></i>
                <input type="password" id="confirm_password" name="confirm_password"
                    placeholder="تأكيد كلمة المرور / Confirm Password" required>
            </div>
            <button type="submit" class="login-button">إنشاء حساب / Sign Up</button>
        </form>

        <div class="signup-link">
            <p>لديك حساب بالفعل؟ <a href="login.html">تسجيل الدخول</a></p>
        </div>
    </div>

</body>

</html>
