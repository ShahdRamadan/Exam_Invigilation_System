<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة المواد | جامعة الغردقة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="Styles/index.css">
</head>

<body>

    <aside class="sidebar">
        <div>
            <div class="brand">
                <img src="Images/UNI_LOGO.png" alt="شعار الجامعة" class="brand-logo">
                <span>جامعة الغردقة</span>
            </div>

            <nav class="nav">
                <a href="#" data-section="dashboard">
                    <i class="fa-solid fa-palette"></i>
                    <span>لوحة التحكم</span>
                </a>
                <a href="students.html" data-section="students">
                    <i class="fa-solid fa-users"></i>
                    <span>الطلاب</span>
                </a>
                <a href="subjects.html" class="active" data-section="subjects">
                    <i class="fa-solid fa-book-open"></i>
                    <span>المواد الدراسية</span>
                </a>
                <a href="invigilators.html" data-section="observers">
                    <i class="fa-solid fa-user-check"></i>
                    <span>المراقبون</span>
                </a>
                <a href="#" data-section="rooms">
                    <i class="fa-solid fa-door-closed"></i>
                    <span>القاعات</span>
                </a>
                <a href="#" data-section="add-schedule">
                    <i class="fa-solid fa-calendar-plus"></i>
                    <span>إضافة جدول</span>
                </a>
                <a href="#" data-section="conflicts">
                    <i class="fa-solid fa-triangle-exclamation"></i>
                    <span>التعارضات</span>
                </a>
            </nav>
        </div>

        <div class="logout">
            <a href="#"><i class="fa-solid fa-arrow-right-from-bracket"></i> تسجيل الخروج</a>
        </div>
    </aside>

    <main class="main">
        <div class="topbar">
            <h1>أهلاً، مسؤول النظام</h1>
            <div class="user">
                <i class="fa-regular fa-user-circle"></i> Admin
            </div>
        </div>

        <section class="content">
            <h2 class="section-title">إدارة المقررات</h2>
            <div class="controls">
                <div class="filter-group">
                    <input type="text" style="width: 250px;" placeholder="بحث باسم المادة أو الكود...">
                    <select style="width: 150px;">
                        <option value="">كل الأقسام</option>
                        <option value="ge">عام</option>
                        <option value="cs">علوم حاسب</option>
                        <option value="is">نظم معلومات</option>
                        <option value="ai">الذكاء الاصطناعي</option>
                        <option value="it">تكنولوجيا المعلومات</option>
                    </select>
                </div>

                <a href="#addSubjectModal" class="btn add">
                    <i class="fa-solid fa-plus"></i> إضافة مادة جديدة
                </a>
            </div>

            <div class="card">
                <table>
                    <thead>
                        <tr>
                            <th>كود المادة</th>
                            <th>اسم المقرر</th>
                            <th>القسم التابع له</th>
                            <th>الفرقة</th>
                            <th>الساعات المعتمدة</th>
                            <th>نوع المادة</th>
                            <th>الإجراءات</th>
                        </tr>
                    </thead>
                    <tbody>

                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <div id="addSubjectModal" class="modal-overlay">
        <div class="modal">
            <h3>إضافة مقرر دراسي جديد</h3>

            <form action="/subjects/save" method="POST">

                <div class="form-row">
                    <div class="col">
                        <label>اسم المادة</label>
                        <input type="text" name="subject_name" required placeholder="مثال: هندسة برمجيات">
                    </div>
                    <div class="col">
                        <label>كود المادة</label>
                        <input type="text" name="subject_code" required placeholder="مثال: CS305">
                    </div>
                </div>

                <div class="form-row">
                    <div class="col">
                        <label>القسم الأكاديمي</label>
                        <select name="department_id" required>
                            <option value="">اختر القسم...</option>
                            <option value="1">عام</option>
                            <option value="2">علوم الحاسب (CS)</option>
                            <option value="3">نظم المعلومات (IS)</option>
                            <option value="4">الذكاء الاصطناعي (AI)</option>
                            <option value="5">تكنولوجيا المعلومات (IT)</option>
                        </select>
                    </div>
                    <div class="col">
                        <label>الفرقة الدراسية</label>
                        <select name="academic_year" required>
                            <option value="1">الفرقة الأولى</option>
                            <option value="2">الفرقة الثانية</option>
                            <option value="3">الفرقة الثالثة</option>
                            <option value="4">الفرقة الرابعة</option>
                        </select>
                    </div>
                </div>

                <div class="form-row">
                    <div class="col">
                        <label>عدد الساعات المعتمدة</label>
                        <input type="number" name="credit_hours" min="1" max="6" value="3">
                    </div>
                    <div class="col">
                        <label>نوع المادة</label>
                        <select name="subject_type">
                            <option value="mandatory">إجباري</option>
                            <option value="elective">اختياري</option>
                        </select>
                    </div>
                </div>

                <div class="modal-actions">
                    <a href="#" class="btn-secondary">إلغاء</a>
                    <button type="submit" class="btn add">حفظ المادة</button>
                </div>

            </form>
        </div>
    </div>

</body>

</html>
