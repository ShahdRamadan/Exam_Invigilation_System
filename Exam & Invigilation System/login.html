<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام المراقبة والامتحانات - جامعة الغردقة</title>

    <link rel="stylesheet" href="Styles/login.css">

    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

    <div class="login-container">

        <header class="login-header">
            <img src="Images/UNI_LOGO.png" alt="شعار جامعة الغردقة" class="logo">
            <h1>نظام المراقبة والامتحانات</h1>
            <p>Hurghada University – Exam & Invigilation System</p>
        </header>

        <form action="#" method="POST" class="login-form">

            <div class="role-selector">
                <input type="radio" id="role-admin" name="role" value="admin" checked>
                <label for="role-admin">أدمن</label>

                <input type="radio" id="role-student" name="role" value="student">
                <label for="role-student">طالب</label>

                <input type="radio" id="role-proctor" name="role" value="proctor">
                <label for="role-proctor"> مراقب / ملاحظ</label>
            </div>

            <div class="input-group">
                <i class="fa-solid fa-user"></i>
                <input type="text" id="username" name="username" placeholder="اسم المستخدم / Username" required>
            </div>

            <div class="input-group">
                <i class="fa-solid fa-lock"></i>
                <input type="password" id="password" name="password" placeholder="كلمة المرور / Password" required>
            </div>

            <div class="form-utils">
                <a href="forgot-password.html" class="forgot-link">هل نسيت كلمة المرور؟</a>
            </div>

            <button type="submit" class="login-button">تسجيل الدخول / Login</button>

        </form>
        <div class="signup-link" id="signup-section">
            <p>ليس لديك حساب؟ <a href="register.html">إنشاء حساب جديد</a></p>
        </div>
    </div>
    <script>

        document.addEventListener('DOMContentLoaded', () => {

            const adminRadio = document.getElementById('role-admin');
            const studentRadio = document.getElementById('role-student');
            const proctorRadio = document.getElementById('role-proctor');
            const signupSection = document.getElementById('signup-section');


            function toggleSignupLink() {
                if (adminRadio.checked) {
                    signupSection.classList.add('hidden');
                } else {
                    signupSection.classList.remove('hidden');
                }
            }


            adminRadio.addEventListener('change', toggleSignupLink);
            studentRadio.addEventListener('change', toggleSignupLink);
            proctorRadio.addEventListener('change', toggleSignupLink);


            toggleSignupLink();
        });

    </script>
</body>

</html>
